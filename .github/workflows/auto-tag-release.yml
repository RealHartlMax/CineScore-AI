name: Auto Tag Release

on:
  push:

permissions:
  contents: write

jobs:
  detect:
    name: Detect release marker
    if: github.ref_type == 'branch' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    outputs:
      reason: ${{ steps.parse.outputs.reason }}
      should_release: ${{ steps.parse.outputs.should_release }}
      tag_name: ${{ steps.parse.outputs.tag_name }}
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Parse commit message
        id: parse
        shell: bash
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          normalize_version() {
            local value="$1"
            value="${value#v}"

            # Legacy shorthand like 0.1.2c or 0.1.2.d is treated as rc0.
            if [[ "$value" =~ ^([0-9]+\.[0-9]+\.[0-9]+)([cC]|\.[0-9A-Za-z]).*$ ]]; then
              value="${BASH_REMATCH[1]}rc0"
            fi

            # Expand bare prerelease suffixes to PEP 440 form: a -> a0, b -> b0, rc -> rc0.
            if [[ "$value" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(a|b|rc)$ ]]; then
              value="${BASH_REMATCH[1]}${BASH_REMATCH[2]}0"
            fi

            echo "$value"
          }

          printf '%s\n' "$COMMIT_MESSAGE"
          if [[ "$COMMIT_MESSAGE" =~ (^|[[:space:]])(release|version|hotfix)[[:space:]]*:[[:space:]]*v?([0-9]+\.[0-9]+\.[0-9]+([-.]?[0-9A-Za-z][0-9A-Za-z.-]*)?)($|[[:space:]]) ]]; then
            VERSION_RAW="${BASH_REMATCH[3]}"
            VERSION=$(normalize_version "${VERSION_RAW}")
            MARKER_KIND="${BASH_REMATCH[2]}"
            echo "reason=marker:${MARKER_KIND}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Detected ${MARKER_KIND} marker for version ${VERSION_RAW} (normalized to ${VERSION})."
          else
            echo "reason=no-marker" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release marker found in the head commit message."
          fi

  validate-version:
    name: Validate requested version
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Validate commit version matches application version
        shell: bash
        run: |
          REQUESTED_VERSION="${{ needs.detect.outputs.version }}"
          APP_VERSION=$(python -c "import re, pathlib; text=pathlib.Path('pyproject.toml').read_text(encoding='utf-8'); m=re.search(r'^version\s*=\s*\"([^\"]+)\"', text, flags=re.MULTILINE); print(m.group(1) if m else '')")
          NORMALIZED_REQUESTED_VERSION=$(python -c "import re; value='${REQUESTED_VERSION}'.strip(); value=value[1:] if value.lower().startswith('v') else value; value=re.sub(r'^(\d+\.\d+\.\d+)[c.](\w).*$', r'\1rc0', value, flags=re.IGNORECASE); print(re.sub(r'^(\d+\.\d+\.\d+)(a|b|rc)$', r'\g<1>\g<2>0', value, flags=re.IGNORECASE))")
          NORMALIZED_APP_VERSION=$(python -c "import re; value='${APP_VERSION}'.strip(); value=value[1:] if value.lower().startswith('v') else value; value=re.sub(r'^(\d+\.\d+\.\d+)[c.](\w).*$', r'\1rc0', value, flags=re.IGNORECASE); print(re.sub(r'^(\d+\.\d+\.\d+)(a|b|rc)$', r'\g<1>\g<2>0', value, flags=re.IGNORECASE))")
          echo "Requested version: $REQUESTED_VERSION"
          echo "Application version: $APP_VERSION"
          echo "Normalized requested version: $NORMALIZED_REQUESTED_VERSION"
          echo "Normalized application version: $NORMALIZED_APP_VERSION"
          if [ "$NORMALIZED_REQUESTED_VERSION" != "$NORMALIZED_APP_VERSION" ]; then
            echo "Commit message version does not match cinescore_ai.version."
            exit 1
          fi

  create-tag:
    name: Create git tag
    needs:
      - detect
      - validate-version
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag_ready: ${{ steps.tag.outputs.tag_ready }}
      tag_created: ${{ steps.tag.outputs.tag_created }}
      tag_reason: ${{ steps.tag.outputs.tag_reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create tag when missing
        id: tag
        shell: bash
        env:
          TAG_NAME: ${{ needs.detect.outputs.tag_name }}
        run: |
          git fetch --tags origin
          if git ls-remote --tags origin "refs/tags/${TAG_NAME}" | grep -q "${TAG_NAME}$"; then
            echo "Tag ${TAG_NAME} already exists on origin."
            echo "tag_ready=true" >> "$GITHUB_OUTPUT"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_reason=already-exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}" "${GITHUB_SHA}" -m "Release ${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"
          echo "tag_ready=true" >> "$GITHUB_OUTPUT"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"
          echo "tag_reason=created" >> "$GITHUB_OUTPUT"

  release:
    name: Publish release
    needs:
      - detect
      - create-tag
    if: needs.detect.outputs.should_release == 'true' && needs.create-tag.outputs.tag_ready == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.detect.outputs.tag_name }}
      release_sha: ${{ github.sha }}
    secrets: inherit

  report:
    name: Report release outcome
    if: always()
    needs:
      - detect
      - validate-version
      - create-tag
      - release
    runs-on: ubuntu-latest

    steps:
      - name: Summarize auto-tag result
        shell: bash
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DETECT_RESULT: ${{ needs.detect.result }}
          DETECT_REASON: ${{ needs.detect.outputs.reason }}
          SHOULD_RELEASE: ${{ needs.detect.outputs.should_release }}
          VERSION: ${{ needs.detect.outputs.version }}
          TAG_NAME: ${{ needs.detect.outputs.tag_name }}
          VALIDATE_RESULT: ${{ needs.validate-version.result }}
          CREATE_TAG_RESULT: ${{ needs.create-tag.result }}
          TAG_READY: ${{ needs.create-tag.outputs.tag_ready }}
          TAG_CREATED: ${{ needs.create-tag.outputs.tag_created }}
          TAG_REASON: ${{ needs.create-tag.outputs.tag_reason }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          summary_title="Auto Tag Release Result"
          if [ "${REF_TYPE}" != "branch" ] || [ "${REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            summary_body="Skipped: auto-tag releases only run on the default branch (${DEFAULT_BRANCH}). Current ref: ${REF_TYPE}/${REF_NAME}."
          elif [ "${DETECT_RESULT}" = "failure" ]; then
            summary_body="Failed while parsing the head commit message for a release marker."
          elif [ "${SHOULD_RELEASE}" != "true" ]; then
            summary_body="No release started: no explicit release marker was found in the head commit message. Expected one of: release:, version:, hotfix:."
          elif [ "${VALIDATE_RESULT}" = "failure" ]; then
            summary_body="Release marker was found for ${VERSION}, but version validation failed. The commit marker must match src/cinescore_ai/version.py."
          elif [ "${CREATE_TAG_RESULT}" = "failure" ]; then
            summary_body="Release marker was found for ${VERSION}, but creating tag ${TAG_NAME} failed."
          elif [ "${TAG_READY}" != "true" ]; then
            summary_body="Release could not continue because tag ${TAG_NAME} is not ready."
          elif [ "${TAG_REASON}" = "already-exists" ] && [ "${RELEASE_RESULT}" = "success" ]; then
            summary_body="Tag ${TAG_NAME} already existed on origin. Reused existing tag and started the release pipeline successfully."
          elif [ "${TAG_REASON}" = "already-exists" ] && [ "${RELEASE_RESULT}" = "failure" ]; then
            summary_body="Tag ${TAG_NAME} already existed on origin. Reused existing tag, but the downstream reusable release workflow failed."
          elif [ "${TAG_CREATED}" != "true" ] && [ "${TAG_REASON}" = "already-exists" ]; then
            summary_body="Tag ${TAG_NAME} already exists on origin and will be reused for release publication."
          elif [ "${RELEASE_RESULT}" = "success" ]; then
            summary_body="Release pipeline started successfully for ${TAG_NAME}."
          elif [ "${RELEASE_RESULT}" = "failure" ]; then
            summary_body="Release pipeline was started for ${TAG_NAME}, but the downstream reusable release workflow failed."
          else
            summary_body="Release pipeline did not continue. Detect=${DETECT_RESULT}, Validate=${VALIDATE_RESULT}, CreateTag=${CREATE_TAG_RESULT}, Release=${RELEASE_RESULT}."
          fi

          echo "${summary_title}: ${summary_body}"
          {
            echo "## ${summary_title}"
            echo
            echo "${summary_body}"
            echo
            echo "- Detect: ${DETECT_RESULT}"
            echo "- Detect reason: ${DETECT_REASON:-n/a}"
            echo "- Should release: ${SHOULD_RELEASE:-false}"
            echo "- Version: ${VERSION:-n/a}"
            echo "- Tag: ${TAG_NAME:-n/a}"
            echo "- Validate version: ${VALIDATE_RESULT}"
            echo "- Create tag: ${CREATE_TAG_RESULT} (${TAG_REASON:-n/a})"
            echo "- Tag ready: ${TAG_READY:-false}"
            echo "- Tag created: ${TAG_CREATED:-false}"
            echo "- Publish release: ${RELEASE_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"