name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v0.2.0"
        required: true
        type: string
      release_sha:
        description: "Optional commit SHA to release. Leave empty to publish the existing tag ref."
        required: false
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      release_sha:
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}

    steps:
      - name: Resolve tag and ref
        id: resolve
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          VERSION_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+([-.]?[0-9A-Za-z][0-9A-Za-z.-]*)?$'
          TAG_PATTERN='^v[0-9]+\.[0-9]+\.[0-9]+([-.]?[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          # Prefer explicit workflow inputs (workflow_call/workflow_dispatch)
          # over event ref values to avoid resolving branch names like 'main'.
          if [ -n "${INPUT_TAG_NAME}" ]; then
            RELEASE_TAG="${INPUT_TAG_NAME}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [ -n "${INPUT_RELEASE_SHA}" ]; then
            RELEASE_REF="${INPUT_RELEASE_SHA}"
          else
            RELEASE_REF="${GITHUB_SHA}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "No release tag was provided."
            exit 1
          fi

          # Allow raw version input like 0.1.1 or 0.1.2c and normalize to a v-prefixed tag.
          if [[ "${RELEASE_TAG}" =~ ${VERSION_PATTERN} ]]; then
            RELEASE_TAG="v${RELEASE_TAG}"
          fi

          # Normalize shorthand prerelease tags like v0.1.3a -> v0.1.3a0 for PEP 440 consistency.
          RAW_VERSION="${RELEASE_TAG#v}"
          NORMALIZED_VERSION=$(python -c "import re,sys; value=sys.argv[1].strip(); value=value[1:] if value.lower().startswith('v') else value; value=re.sub(r'^(\d+\.\d+\.\d+)[c.](\w).*$', r'\1rc0', value, flags=re.IGNORECASE); value=re.sub(r'^(\d+\.\d+\.\d+)(a|b|rc)$', r'\1\20', value, flags=re.IGNORECASE); print(value)" "${RAW_VERSION}")
          RELEASE_TAG="v${NORMALIZED_VERSION}"

          if ! [[ "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
            # Recovery path for reusable workflow calls where a branch name
            # may be passed accidentally. Try to infer a valid release tag
            # from the requested commit SHA.
            if [ -n "${INPUT_RELEASE_SHA}" ]; then
              INFERRED_TAG=$(git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" | awk -v sha="${INPUT_RELEASE_SHA}" '$1 == sha {print $2}' | sed 's#refs/tags/##' | grep -E "${TAG_PATTERN}" | sort -V | tail -n 1 || true)
              if [ -n "${INFERRED_TAG}" ]; then
                echo "Input tag '${RELEASE_TAG}' is invalid. Using inferred tag '${INFERRED_TAG}' for commit ${INPUT_RELEASE_SHA}."
                RELEASE_TAG="${INFERRED_TAG}"
              fi
            fi

            if ! [[ "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
              echo "Invalid release tag '${RELEASE_TAG}'. Expected format 'vX.Y.Z' or 'vX.Y.Zsuffix' (optionally with separator)."
              exit 1
            fi
          fi

          if [ -z "${INPUT_RELEASE_SHA}" ]; then
            RELEASE_REF="refs/tags/${RELEASE_TAG}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${RELEASE_REF}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate tag and tests
    needs: context
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.context.outputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate tag version matches application version
        shell: bash
        run: |
          TAG_VERSION="${{ needs.context.outputs.release_version }}"
          APP_VERSION=$(python -c "from cinescore_ai.version import get_app_version; print(get_app_version())")
          NORMALIZED_TAG_VERSION=$(python -c "import re; value='${TAG_VERSION}'.strip(); value=value[1:] if value.lower().startswith('v') else value; value=re.sub(r'^(\d+\.\d+\.\d+)[c.](\w).*$', r'\1rc0', value, flags=re.IGNORECASE); print(re.sub(r'^(\d+\.\d+\.\d+)(a|b|rc)$', r'\1\20', value, flags=re.IGNORECASE))")
          NORMALIZED_APP_VERSION=$(python -c "import re; value='${APP_VERSION}'.strip(); value=value[1:] if value.lower().startswith('v') else value; value=re.sub(r'^(\d+\.\d+\.\d+)[c.](\w).*$', r'\1rc0', value, flags=re.IGNORECASE); print(re.sub(r'^(\d+\.\d+\.\d+)(a|b|rc)$', r'\1\20', value, flags=re.IGNORECASE))")
          echo "Release tag: ${{ needs.context.outputs.release_tag }}"
          echo "Tag version: $TAG_VERSION"
          echo "App version: $APP_VERSION"
          echo "Normalized tag version: $NORMALIZED_TAG_VERSION"
          echo "Normalized app version: $NORMALIZED_APP_VERSION"
          if [ "$NORMALIZED_TAG_VERSION" != "$NORMALIZED_APP_VERSION" ]; then
            echo "Tag version and application version do not match."
            exit 1
          fi

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          QT_MAC_WANTS_LAYER: "1"
        run: python -m pytest

  windows-installer:
    name: Build Windows installer
    needs:
      - context
      - validate
    runs-on: windows-latest
    outputs:
      windows_exe_sha256: ${{ steps.checksum.outputs.windows_exe_sha256 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.context.outputs.release_ref }}

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          $outputDir = Join-Path $PWD "release"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ needs.context.outputs.release_version }}" `
            "/DSourceRoot=$PWD" `
            "/DOutputDir=$outputDir" `
            "packaging\windows\CineScoreAI.iss"

      - name: Compute installer checksum
        id: checksum
        shell: powershell
        run: |
          $installerPath = Join-Path $PWD "release\CineScore-AI-Setup.exe"
          if (-not (Test-Path $installerPath)) {
            throw "Installer was not created at $installerPath"
          }

          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "windows_exe_sha256=$hash`n")

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/CineScore-AI-Setup.exe
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs:
      - context
      - validate
      - windows-installer
    runs-on: ubuntu-latest
    outputs:
      runtime_zip_sha256: ${{ steps.checksums.outputs.runtime_zip_sha256 }}
      runtime_tar_gz_sha256: ${{ steps.checksums.outputs.runtime_tar_gz_sha256 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.context.outputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ needs.context.outputs.release_version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREVIOUS_TAG" ]; then
            LOG=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:'- %s')
          else
            LOG=$(git log --pretty=format:'- %s')
          fi
          if [ -z "$LOG" ]; then
            LOG='- Initial release'
          fi

          {
            echo "body<<EOF"
            echo "## CineScore AI ${{ needs.context.outputs.release_tag }}"
            echo
            echo "### Highlights"
            echo "$LOG"
            echo
            echo "### Assets"
            echo "- Windows installer: `CineScore-AI-Setup.exe`"
            echo "- Windows portable runtime: `CineScore-AI-v${VERSION}-runtime-windows.zip`"
            echo "- macOS/Linux portable runtime: `CineScore-AI-v${VERSION}-runtime-macos-linux.tar.gz`"
            echo "- Python source distribution: `cinescore_ai-${VERSION}.tar.gz`"
            echo "- GitHub auto-generated source snapshots: `Source code (zip)` and `Source code (tar.gz)`"
            echo
            echo "### Installation"
            echo '- Source checkout: install with `python -m pip install -e .[dev]`'
            echo '- Resolve runtime: run `python scripts/install_resolve_runtime.py`'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Create runtime archives
        shell: bash
        run: |
          VERSION="${{ needs.context.outputs.release_version }}"
          mkdir -p release/CineScore-AI-runtime
          cp -R src release/CineScore-AI-runtime/
          cp -R scripts release/CineScore-AI-runtime/
          cp README.md LICENSE pyproject.toml release/CineScore-AI-runtime/

          cd release
          zip -r "CineScore-AI-v${VERSION}-runtime-windows.zip" "CineScore-AI-runtime"
          tar -czf "CineScore-AI-v${VERSION}-runtime-macos-linux.tar.gz" "CineScore-AI-runtime"

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release

      - name: Create checksums
        id: checksums
        shell: bash
        run: |
          VERSION="${{ needs.context.outputs.release_version }}"
          cd release
          ZIP_FILE="CineScore-AI-v${VERSION}-runtime-windows.zip"
          TAR_GZ_FILE="CineScore-AI-v${VERSION}-runtime-macos-linux.tar.gz"
          EXE_FILE="CineScore-AI-Setup.exe"
          ZIP_SHA=$(sha256sum "${ZIP_FILE}" | awk '{print $1}')
          TAR_GZ_SHA=$(sha256sum "${TAR_GZ_FILE}" | awk '{print $1}')
          echo "runtime_zip_sha256=${ZIP_SHA}" >> "$GITHUB_OUTPUT"
          echo "runtime_tar_gz_sha256=${TAR_GZ_SHA}" >> "$GITHUB_OUTPUT"
          sha256sum "${EXE_FILE}" "${ZIP_FILE}" "${TAR_GZ_FILE}" > "CineScore-AI-v${VERSION}-SHA256SUMS.txt"

      - name: Publish GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.context.outputs.release_tag }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        run: |
          shopt -s nullglob

          ASSET_FILES=(dist/*.tar.gz release/*.exe release/*.zip release/*.tar.gz release/*SHA256SUMS.txt)
          if [ ${#ASSET_FILES[@]} -eq 0 ]; then
            echo "No release assets were found to publish."
            exit 1
          fi

          NOTES_FILE="$(mktemp)"
          printf '%s\n' "$RELEASE_BODY" > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "CineScore AI $RELEASE_TAG" \
              --notes-file "$NOTES_FILE"
            gh release upload "$RELEASE_TAG" "${ASSET_FILES[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${ASSET_FILES[@]}" \
              --title "CineScore AI $RELEASE_TAG" \
              --notes-file "$NOTES_FILE"
          fi

  notify-changelog:
    name: Notify changelog to Discord
    needs:
      - context
      - release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Extract changelog highlights
        id: highlights
        shell: bash
        run: |
          RELEASE_VERSION="${{ needs.context.outputs.release_version }}"
          CHANGELOG_FILE="CHANGELOG.md"

          # Extract version block from changelog without failing when version is missing.
          VERSION_BLOCK=$(awk -v v="$RELEASE_VERSION" '
            BEGIN {in_block=0}
            $0 ~ "^## \\[" v "\\]" {in_block=1; next}
            in_block && $0 ~ "^## \\[" {exit}
            in_block {print}
          ' "$CHANGELOG_FILE")

          # Extract highlights (first 5 bullet points) with a fallback to avoid pipefail exits.
          HIGHLIGHTS=$(printf '%s\n' "$VERSION_BLOCK" | grep "^- " | head -5 | cut -c3- | sed 's/^/• /' || true)
          if [ -z "$HIGHLIGHTS" ]; then
            HIGHLIGHTS="• No changelog highlights found for ${RELEASE_VERSION}."
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "highlights<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$HIGHLIGHTS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Send changelog to Discord
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        with:
          webhook: ${{ secrets.DISCORD_CHANGELOG_CINESCORE }}
          status: success
          title: "📝 Changelog für CineScore AI ${{ needs.context.outputs.release_tag }}"
          description: |
            **Version:** ${{ needs.context.outputs.release_tag }}
            ${{ steps.highlights.outputs.highlights }}
            
            [Zum Release auf GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.context.outputs.release_tag }})
          color: 0x3498db

  update-versions-json:
    name: Update versions.json checksums
    needs:
      - context
      - release
      - windows-installer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Update checksums for current release
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.context.outputs.release_version }}
          RELEASE_TAG: ${{ needs.context.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WINDOWS_EXE_SHA256: ${{ needs.windows-installer.outputs.windows_exe_sha256 }}
          RUNTIME_ZIP_SHA256: ${{ needs.release.outputs.runtime_zip_sha256 }}
          RUNTIME_TAR_GZ_SHA256: ${{ needs.release.outputs.runtime_tar_gz_sha256 }}
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          release_version = "${{ env.RELEASE_VERSION }}"
          release_tag = "${{ env.RELEASE_TAG }}"
          github_repository = "${{ env.GITHUB_REPOSITORY }}"
          windows_exe_sha256 = "${{ env.WINDOWS_EXE_SHA256 }}"
          runtime_zip_sha256 = "${{ env.RUNTIME_ZIP_SHA256 }}"
          runtime_tar_gz_sha256 = "${{ env.RUNTIME_TAR_GZ_SHA256 }}"

          if not windows_exe_sha256 or not runtime_zip_sha256 or not runtime_tar_gz_sha256:
              raise SystemExit("Missing checksum outputs from workflow jobs.")

          versions_path = Path("versions.json")
          changelog_path = Path("CHANGELOG.md")
          data = json.loads(versions_path.read_text(encoding="utf-8"))
          changelog_text = changelog_path.read_text(encoding="utf-8")

          def _extract_language_blocks(text: str) -> tuple[str, str]:
              marker = "\n# Changelog (Deutsch)\n"
              if marker not in text:
                  return text, ""
              english_block, german_block = text.split(marker, 1)
              return english_block, german_block

          def _extract_version_block(text: str, version: str) -> str:
              match = re.search(rf"^## \[{re.escape(version)}\] - .*$", text, flags=re.MULTILINE)
              if not match:
                  return ""
              remaining = text[match.end():]
              next_match = re.search(r"^## \[", remaining, flags=re.MULTILINE)
              if next_match:
                  return text[match.start(): match.end() + next_match.start()]
              return text[match.start():]

          def _extract_summary(block: str) -> str:
              summary_match = re.search(r"^### .+?\n\n(.+?)(?:\n\n### |\Z)", block, flags=re.MULTILINE | re.DOTALL)
              if not summary_match:
                  return ""
              summary = summary_match.group(1).strip()
              summary_lines = [line.strip() for line in summary.splitlines() if line.strip() and not line.strip().startswith("-")]
              return " ".join(summary_lines).strip()

          def _extract_highlights(block: str) -> list[str]:
              titles = [title.strip() for title in re.findall(r"^- \*\*(.+?)\*\*", block, flags=re.MULTILINE)]
              if titles:
                  return titles[:5]
              fallback = [line[2:].strip() for line in block.splitlines() if line.startswith("- ")]
              return fallback[:5]

          english_changelog, german_changelog = _extract_language_blocks(changelog_text)
          english_block = _extract_version_block(english_changelog, release_version)
          german_block = _extract_version_block(german_changelog, release_version)
          english_summary = _extract_summary(english_block)
          german_summary = _extract_summary(german_block)
          english_highlights = _extract_highlights(english_block)
          german_highlights = _extract_highlights(german_block)

          releases = data.get("releases", [])
          target = next((item for item in releases if item.get("version") == release_version), None)
          if target is None:
              raise SystemExit(f"Release version {release_version} not found in versions.json")

          download_urls = target.setdefault("download_urls", {})
          download_urls["windows_exe"] = (
              f"https://github.com/{github_repository}/releases/download/{release_tag}/CineScore-AI-Setup.exe"
          )
          download_urls["runtime_zip"] = (
              f"https://github.com/{github_repository}/releases/download/{release_tag}/"
              f"CineScore-AI-v{release_version}-runtime-windows.zip"
          )
          download_urls["runtime_tar_gz"] = (
              f"https://github.com/{github_repository}/releases/download/{release_tag}/"
              f"CineScore-AI-v{release_version}-runtime-macos-linux.tar.gz"
          )
          download_urls["source"] = (
              f"https://github.com/{github_repository}/archive/refs/tags/{release_tag}.zip"
          )

          if english_highlights:
              target["highlights"] = target.get("highlights", {})
              target["highlights"]["en"] = english_highlights
          if german_highlights:
              target["highlights"] = target.get("highlights", {})
              target["highlights"]["de"] = german_highlights

          if english_summary:
              target["release_notes_en"] = f"{english_summary} See CHANGELOG.md for full details."
          if german_summary:
              target["release_notes_de"] = f"{german_summary} Siehe CHANGELOG.md fuer vollstaendige Details."

          checksums = target.setdefault("checksums", {})
          if windows_exe_sha256:
              checksums["windows_exe"] = windows_exe_sha256
          checksums["runtime_zip"] = runtime_zip_sha256
          checksums["runtime_tar_gz"] = runtime_tar_gz_sha256

          versions_path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit and push versions.json update
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.context.outputs.release_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          if git diff --quiet -- versions.json; then
            echo "No versions.json changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(release): update checksums for v${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

  notify-release:
    name: Notify release to Discord
    needs:
      - context
      - update-versions-json
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send release notification to Discord
        uses: sarisia/actions-status-discord@v1
        continue-on-error: true
        with:
          webhook: ${{ secrets.DISCORD_RELEASE_CINESCORE }}
          status: success
          title: "🚀 CineScore AI ${{ needs.context.outputs.release_tag }} veröffentlicht"
          description: |
            **Neue Version:** ${{ needs.context.outputs.release_tag }}
            
            **Assets:**
            • Windows Installer: `CineScore-AI-Setup.exe`
            • Windows Runtime: `CineScore-AI-v${{ needs.context.outputs.release_version }}-runtime-windows.zip`
            • macOS/Linux Runtime: `CineScore-AI-v${{ needs.context.outputs.release_version }}-runtime-macos-linux.tar.gz`
            
            [📥 Zum Download auf GitHub](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.context.outputs.release_tag }})
          color: 0x00ff00
