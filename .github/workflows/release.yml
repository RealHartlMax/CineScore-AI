name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish, for example v0.2.0"
        required: true
        type: string
      release_sha:
        description: "Optional commit SHA to release. Leave empty to publish the existing tag ref."
        required: false
        type: string
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
      release_sha:
        required: true
        type: string

permissions:
  contents: write

jobs:
  context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}

    steps:
      - name: Resolve tag and ref
        id: resolve
        shell: bash
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          SEMVER_PATTERN='^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'
          TAG_PATTERN='^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'

          # Prefer explicit workflow inputs (workflow_call/workflow_dispatch)
          # over event ref values to avoid resolving branch names like 'main'.
          if [ -n "${INPUT_TAG_NAME}" ]; then
            RELEASE_TAG="${INPUT_TAG_NAME}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [ -n "${INPUT_RELEASE_SHA}" ]; then
            RELEASE_REF="${INPUT_RELEASE_SHA}"
          else
            RELEASE_REF="${GITHUB_SHA}"
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "No release tag was provided."
            exit 1
          fi

          # Allow raw semver input like 0.1.1 and normalize to v0.1.1.
          if [[ "${RELEASE_TAG}" =~ ${SEMVER_PATTERN} ]]; then
            RELEASE_TAG="v${RELEASE_TAG}"
          fi

          if ! [[ "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
            # Recovery path for reusable workflow calls where a branch name
            # may be passed accidentally. Try to infer a valid release tag
            # from the requested commit SHA.
            if [ -n "${INPUT_RELEASE_SHA}" ]; then
              INFERRED_TAG=$(git ls-remote --tags "https://github.com/${GITHUB_REPOSITORY}.git" | awk -v sha="${INPUT_RELEASE_SHA}" '$1 == sha {print $2}' | sed 's#refs/tags/##' | grep -E "${TAG_PATTERN}" | sort -V | tail -n 1 || true)
              if [ -n "${INFERRED_TAG}" ]; then
                echo "Input tag '${RELEASE_TAG}' is invalid. Using inferred tag '${INFERRED_TAG}' for commit ${INPUT_RELEASE_SHA}."
                RELEASE_TAG="${INFERRED_TAG}"
              fi
            fi

            if ! [[ "${RELEASE_TAG}" =~ ${TAG_PATTERN} ]]; then
              echo "Invalid release tag '${RELEASE_TAG}'. Expected format 'vX.Y.Z' (optionally with pre-release/build suffix)."
              exit 1
            fi
          fi

          if [ -z "${INPUT_RELEASE_SHA}" ]; then
            RELEASE_REF="refs/tags/${RELEASE_TAG}"
          fi

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${RELEASE_REF}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate tag and tests
    needs: context
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.context.outputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate tag version matches application version
        shell: bash
        run: |
          TAG_VERSION="${{ needs.context.outputs.release_version }}"
          APP_VERSION=$(python -c "from cinescore_ai.version import get_app_version; print(get_app_version())")
          echo "Release tag: ${{ needs.context.outputs.release_tag }}"
          echo "Tag version: $TAG_VERSION"
          echo "App version: $APP_VERSION"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version and application version do not match."
            exit 1
          fi

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest

  release:
    name: Create GitHub release
    needs:
      - context
      - validate
    runs-on: ubuntu-latest
    outputs:
      runtime_zip_sha256: ${{ steps.checksums.outputs.runtime_zip_sha256 }}
      runtime_tar_gz_sha256: ${{ steps.checksums.outputs.runtime_tar_gz_sha256 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.context.outputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREVIOUS_TAG" ]; then
            LOG=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:'- %s')
          else
            LOG=$(git log --pretty=format:'- %s')
          fi
          if [ -z "$LOG" ]; then
            LOG='- Initial release'
          fi

          {
            echo "body<<EOF"
            echo "## CineScore AI ${{ needs.context.outputs.release_tag }}"
            echo
            echo "### Highlights"
            echo "$LOG"
            echo
            echo "### Installation"
            echo '- Source checkout: install with `python -m pip install -e .[dev]`'
            echo '- Resolve runtime: run `python scripts/install_resolve_runtime.py`'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Create runtime archives
        shell: bash
        run: |
          VERSION="${{ needs.context.outputs.release_version }}"
          mkdir -p release/CineScore-AI-runtime
          cp -R src release/CineScore-AI-runtime/
          cp -R scripts release/CineScore-AI-runtime/
          cp README.md LICENSE pyproject.toml release/CineScore-AI-runtime/

          cd release
          zip -r "CineScore-AI-runtime-v${VERSION}.zip" "CineScore-AI-runtime"
          tar -czf "CineScore-AI-runtime-v${VERSION}.tar.gz" "CineScore-AI-runtime"

      - name: Create checksums
        id: checksums
        shell: bash
        run: |
          VERSION="${{ needs.context.outputs.release_version }}"
          cd release
          ZIP_FILE="CineScore-AI-runtime-v${VERSION}.zip"
          TAR_GZ_FILE="CineScore-AI-runtime-v${VERSION}.tar.gz"
          ZIP_SHA=$(sha256sum "${ZIP_FILE}" | awk '{print $1}')
          TAR_GZ_SHA=$(sha256sum "${TAR_GZ_FILE}" | awk '{print $1}')
          echo "runtime_zip_sha256=${ZIP_SHA}" >> "$GITHUB_OUTPUT"
          echo "runtime_tar_gz_sha256=${TAR_GZ_SHA}" >> "$GITHUB_OUTPUT"
          sha256sum "CineScore-AI-runtime-v${VERSION}.zip" "CineScore-AI-runtime-v${VERSION}.tar.gz" > "CineScore-AI-v${VERSION}-SHA256SUMS.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.context.outputs.release_tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/*.tar.gz
            release/*.zip
            release/*.tar.gz
            release/*SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-versions-json:
    name: Update versions.json checksums
    needs:
      - context
      - release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Update checksums for current release
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.context.outputs.release_version }}
          RELEASE_TAG: ${{ needs.context.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUNTIME_ZIP_SHA256: ${{ needs.release.outputs.runtime_zip_sha256 }}
          RUNTIME_TAR_GZ_SHA256: ${{ needs.release.outputs.runtime_tar_gz_sha256 }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          release_version = "${{ env.RELEASE_VERSION }}"
          release_tag = "${{ env.RELEASE_TAG }}"
          github_repository = "${{ env.GITHUB_REPOSITORY }}"
          github_token = "${{ env.GITHUB_TOKEN }}"
          runtime_zip_sha256 = "${{ env.RUNTIME_ZIP_SHA256 }}"
          runtime_tar_gz_sha256 = "${{ env.RUNTIME_TAR_GZ_SHA256 }}"

          if not runtime_zip_sha256 or not runtime_tar_gz_sha256:
              raise SystemExit("Missing checksum outputs from release job.")

          if not github_token:
              raise SystemExit("Missing GITHUB_TOKEN for release asset lookup.")

          release_api_url = f"https://api.github.com/repos/{github_repository}/releases/tags/{release_tag}"

          def _api_headers(accept: str) -> dict[str, str]:
              return {
                  "Authorization": f"Bearer {github_token}",
                  "Accept": accept,
                  "X-GitHub-Api-Version": "2022-11-28",
              }

          def _fetch_release_payload() -> dict | None:
              request = urllib.request.Request(
                  release_api_url,
                  headers=_api_headers("application/vnd.github+json"),
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.loads(response.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return None
                  raise

          def _find_exe_asset(payload: dict | None) -> dict | None:
              if not payload:
                  return None
              return next(
                  (
                      asset
                      for asset in payload.get("assets", [])
                      if asset.get("name") == "CineScore-AI-Setup.exe"
                  ),
                  None,
              )

          print("Attempt 1: Checking release for CineScore-AI-Setup.exe ...")
          release_payload = _fetch_release_payload()
          exe_asset = _find_exe_asset(release_payload)

          if exe_asset is None:
              max_retries = 6
              retry_interval_seconds = 30
              print(
                  "Attempt 1 failed: installer asset not visible yet. "
                  f"Waiting with polling (Attempt 2) for up to {max_retries * retry_interval_seconds} seconds..."
              )

              for attempt in range(1, max_retries + 1):
                  time.sleep(retry_interval_seconds)
                  release_payload = _fetch_release_payload()
                  exe_asset = _find_exe_asset(release_payload)
                  if exe_asset is not None:
                      print(f"Attempt 2 success on poll #{attempt}: installer asset is now available.")
                      break

          windows_exe_sha256 = None
          if exe_asset is not None:
              download_url = exe_asset.get("browser_download_url")
              if not download_url:
                  raise SystemExit("Installer asset has no download URL.")

              print("Attempt 1 (final step): Downloading installer and computing checksum...")
              asset_request = urllib.request.Request(
                  download_url,
                  headers=_api_headers("application/octet-stream"),
              )
              with urllib.request.urlopen(asset_request) as response:
                  exe_bytes = response.read()
              windows_exe_sha256 = hashlib.sha256(exe_bytes).hexdigest()
              print("Computed windows_exe checksum successfully.")
          else:
              print(
                  "Warning: Could not find 'CineScore-AI-Setup.exe' after initial check and polling. "
                  "Keeping existing checksums.windows_exe value in versions.json."
              )

          versions_path = Path("versions.json")
          data = json.loads(versions_path.read_text(encoding="utf-8"))

          releases = data.get("releases", [])
          target = next((item for item in releases if item.get("version") == release_version), None)
          if target is None:
              raise SystemExit(f"Release version {release_version} not found in versions.json")

          checksums = target.setdefault("checksums", {})
            if windows_exe_sha256:
              checksums["windows_exe"] = windows_exe_sha256
          checksums["runtime_zip"] = runtime_zip_sha256
          checksums["runtime_tar_gz"] = runtime_tar_gz_sha256

          versions_path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
          PY

      - name: Commit and push versions.json update
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.context.outputs.release_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
        run: |
          if git diff --quiet -- versions.json; then
            echo "No versions.json changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore(release): update checksums for v${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
